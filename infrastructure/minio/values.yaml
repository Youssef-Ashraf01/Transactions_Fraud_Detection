# ── Deployment mode ───────────────────────────────────────────
mode: standalone

# ── Credentials ───────────────────────────────────────────────
rootUser: nexgen-admin
rootPassword: nexgen-secret-2026

# ── Storage ───────────────────────────────────────────────────
persistence:
  enabled: true
  size: 10Gi

# ── Resources ─────────────────────────────────────────────────
resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m

# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 9000

# ── Console (UI) ──────────────────────────────────────────────
consoleService:
  type: ClusterIP
  port: 9001

# ── Buckets — created automatically on startup ────────────────
buckets:
  - name: nexgen-lakehouse
    policy: none
    purge: false
  - name: nexgen-checkpoints
    policy: none
    purge: false
  - name: nexgen-logs
    policy: none
    purge: false

# ── Disable distributed mode features not needed locally ──────
replicas: 1
drivesPerNode: 1
pools: 1
