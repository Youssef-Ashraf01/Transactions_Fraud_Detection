apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-insight
  namespace: fraud-app
  labels:
    app: redis-insight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-insight
  template:
    metadata:
      labels:
        app: redis-insight
    spec:
      containers:
        - name: redis-insight
          image: redis/redisinsight:latest
          ports:
            - containerPort: 5540
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 5540
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: redis-insight
  namespace: fraud-app
  labels:
    app: redis-insight
spec:
  selector:
    app: redis-insight
  ports:
    - name: http
      port: 5540
      targetPort: 5540
  type: ClusterIP
