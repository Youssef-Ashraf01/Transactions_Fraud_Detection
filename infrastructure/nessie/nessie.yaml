# ── Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nessie
  namespace: storage
  labels:
    app: nessie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nessie
  template:
    metadata:
      labels:
        app: nessie
    spec:
      containers:
        - name: nessie
          image: projectnessie/nessie:0.76.0
          ports:
            - containerPort: 19120
          env:
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: rocksdb
            - name: NESSIE_VERSION_STORE_TYPE
              value: ROCKSDB
            - name: NESSIE_ROCKSDB_PATH
              value: /nessie/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: nessie-data
              mountPath: /nessie/data
          livenessProbe:
            httpGet:
              path: /api/v1/config
              port: 19120
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/config
              port: 19120
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: nessie-data
          persistentVolumeClaim:
            claimName: nessie-pvc
---
# ── PersistentVolumeClaim ─────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nessie-pvc
  namespace: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# ── Service ───────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nessie
  namespace: storage
  labels:
    app: nessie
spec:
  selector:
    app: nessie
  ports:
    - name: http
      port: 19120
      targetPort: 19120
  type: ClusterIP
