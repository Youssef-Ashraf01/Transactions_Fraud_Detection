apiVersion: apps/v1
kind: Deployment
metadata:
  name: nessie
  namespace: storage
  labels:
    app: nessie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nessie
  template:
    metadata:
      labels:
        app: nessie
    spec:
      containers:
        - name: nessie
          image: projectnessie/nessie:0.76.0
          ports:
            - containerPort: 19120
          env:
            # ── Storage ───────────────────────────────────────
            - name: NESSIE_VERSION_STORE_TYPE
              value: ROCKSDB
            - name: NESSIE_ROCKSDB_PATH
              value: /nessie/data
            # ── Disable OIDC authentication ───────────────────
            # Nessie 0.76 enables OIDC by default and crashes
            # trying to reach a Keycloak server that doesn't exist
            - name: QUARKUS_OIDC_ENABLED
              value: "false"
            - name: NESSIE_SERVER_AUTHENTICATION_ENABLED
              value: "false"
            # ── Disable OIDC tenant entirely ──────────────────
            - name: QUARKUS_OIDC_TENANT_ENABLED
              value: "false"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: nessie-data
              mountPath: /nessie/data
          livenessProbe:
            httpGet:
              path: /api/v1/config
              port: 19120
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/config
              port: 19120
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: nessie-data
          persistentVolumeClaim:
            claimName: nessie-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nessie-pvc
  namespace: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nessie
  namespace: storage
  labels:
    app: nessie
spec:
  selector:
    app: nessie
  ports:
    - name: http
      port: 19120
      targetPort: 19120
  type: ClusterIP
